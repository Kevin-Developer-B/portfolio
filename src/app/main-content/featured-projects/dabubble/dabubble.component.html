<section>
    <div class="box">
        <div class="text-container">
            <span class="number-name-container">
                <h1>03</h1>
                <h2>DABubble</h2>
            </span>
            <div class="explain-container">
                <span>
                    <h3>What is this project about?</h3>
                    <p class="explain-text">This App is a Slack Clone App. It revolutionizes team communication and collaboration with its
                        intuitive interface, real-time messaging, and robust channel organization. </p>
                </span>
                <div class="applications">
                    <div class="individual-application">
                        <img src="./../../../../assets/img/Javascript-overlay.svg" alt="">
                        <p class="application-name">JavaScript</p>
                    </div>
                    <div class="individual-application">
                        <img src="./../../../../assets/img/html-overlay.svg" alt="">
                        <p class="application-name">HTML</p>
                    </div>
                    <div class="individual-application">
                        <img src="./../../../../assets/img/css-overlay.svg" alt="">
                        <p class="application-name">CSS</p>
                    </div>
                </div>
            </div>
            <div class="ckeck-container">
                <button class="ckeck-button" style="width: 130px;">
                    <p>GitHub</p>
                    <img src="./../../../../assets/img/arrow_outward-overlay.svg" alt="">
                </button>
                <button class="ckeck-button" style="width: 142px;">
                    <p>Live Test</p>
                    <img src="./../../../../assets/img/arrow_outward-overlay.svg" alt="">
                </button>
            </div>
        </div>
        <div class="close-image-container">
            <button (click)="onCloseClick()">
                <svg class="close-img" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16"
                    role="img" aria-label="Schließen">
                    <title>Schließen</title>
                    <g stroke="" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4.5 4.5L11.5 11.5" />
                        <path d="M11.5 4.5L4.5 11.5" />
                    </g>
                </svg>
            </button>
            <img class="image" src="./../../../../assets/img/daBubble-overlay.svg" alt="">
            <button class="next-project-container" (click)="onNextClick()">
                <p>Next project</p>
                <img src="./../../../../assets/img/arrow_right.svg" alt="">
            </button>
        </div>
    </div>
</section>
