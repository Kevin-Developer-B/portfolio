<div class="box">
    <button class="close-img" (click)="onCloseClick()">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16" role="img"
            aria-label="Schließen">
            <title>Schließen</title>
            <g stroke="" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4.5 4.5L11.5 11.5" />
                <path d="M11.5 4.5L4.5 11.5" />
            </g>
        </svg>
    </button>
    <div class="text-container">
        <span class="number-name-container">
            <h1>03</h1>
            <h2>Memory App</h2>
        </span>
        <div class="explain-container">
            <span>
                <h3>{{ 'project_about' | translate }}</h3>
                <p class="explain-text">{{ 'memory_project_about_text1' | translate }} </p>
            </span>
            <div class="applications">
                <div class="individual-application">
                    <img src="./../../../../assets/img/typeScript-overlay.svg" alt="">
                    <p class="application-name">TypeScript</p>
                </div>
                <div class="individual-application">
                    <img src="./../../../../assets/img/sass-overlay.png" alt="">
                    <p class="application-name">SCSS</p>
                </div>
            </div>
        </div>
        <div class="ckeck-container">
            <a href="https://github.com/Kevin-Developer-B/memoryApp" target="_blank" class="ckeck-button"
                style="width: 130px;">
                <p>GitHub</p>
                <img src="./../../../../assets/img/arrow_outward-overlay.svg" alt="">
            </a>
            <a href="https://memory.kevin-breiter.de/" target="_blank" class="ckeck-button" style="width: 142px;">
                <p>Live Test</p>
                <img src="./../../../../assets/img/arrow_outward-overlay.svg" alt="">
            </a>
        </div>
    </div>
    <div class="close-image-container">
        <img class="image new-img" src="./../../../../assets/img/memory.png" alt="">
    </div>
    <button class="next-project-container" (click)="onNextClick()">
        <p>{{ 'next' | translate }}</p>
        <img src="./../../../../assets/img/arrow_forward_turquoise.svg" alt="">
    </button>
</div>
