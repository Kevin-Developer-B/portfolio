<section class="evaluation-box">
    <span class="evaluation-headline">
        <h2>{{ 'colleagues' | translate }}</h2>
    </span>

    <div class="slider-wrapper">
        <div class="slider-container">
            <div class="slider-track" #sliderTrack>
                <div class="card" *ngFor="let c of comments">
                    <p class="card-text">{{ c | translate }}</p>
                </div>
            </div>
        </div>
    </div>
    <div class="slider-buttons">
        <button class="btn prev" #prevBtn></button>
        <div class="pagination" #paginationDots></div>
        <button class="btn next" #nextBtn></button>
    </div>

</section>
