<div #splideRoot class="splide">
    <div class="splide__track">
        <ul class="splide__list">
            <li class="splide__slide" *ngFor="let item of comments; let i = index" [class.cardActive]="i === activeIndex">
                <div class="card">
                    <p>{{ item.text | translate }}</p>
                    <strong>{{ item.author | translate }}</strong>
                </div>
            </li>
        </ul>
    </div>
</div>

<div class="custom-nav">
    <div class="costum-box">
        <button class="arrow arrow-back" (click)="goPrev()"></button>
        <span *ngFor="let item of comments; let i = index" [class.dotsActive]="i === activeIndex"></span>
        <button class="arrow arrow-forward" (click)="goNext()"></button>
    </div>
</div>
